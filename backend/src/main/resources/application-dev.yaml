# DEV profile configuration
spring:
  config:
    activate:
      on-profile: dev

  docker:
    compose:
      enabled: false

  datasource:
    url: jdbc:postgresql://${DB_HOST:127.0.0.1}:${DB_PORT:5432}/${POSTGRES_DB:wteam_db}
    username: ${POSTGRES_USER:wteam_db_user}
    password: ${POSTGRES_PASSWORD:hjhgjhjkhgjkthgjkthgjkt4hgjk4hgjk4hgjk4}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: DevHikariPool

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    com.wteam.backend: DEBUG
    org.springframework: INFO
    org.springframework.jdbc.core: DEBUG
