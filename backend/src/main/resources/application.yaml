spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${OAUTH2_CLIENT_ID}
            client-secret: ${OAUTH2_CLIENT_SECRET}

  jpa:
    open-in-view: false

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: "notification-group"
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.wteam.backend.*"

  mail:
    host: smtp.resend.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

jwt:
  token:
    signing_key: ${JWT_SIGNING_KEY}
    expiration: ${JWT_EXPIRATION}

server:
  servlet:
    context-path: /api/v1
  port: 8080

app:
  frontend:
    url: ${APP_FRONTEND_URL:http://localhost:5173}
    oauth2-redirect-uri: ${app.frontend.url}/oauth2/redirect
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,https://localhost:5173,http://localhost:5174}
  mail:
    from: "onboarding@resend.dev"

openai:
  api-key: ${OPENAI_API_KEY}
springdoc:
  packagesToScan: com.wteam.backend
liqpay:
  public-key: ${LIQPAY_PUBLIC_KEY:sandbox_xxx}
  private-key: ${LIQPAY_PRIVATE_KEY:sandbox_yyy}
  server-url: ${LIQPAY_SERVER_URL:http://localhost:8080/api/v1/payments/callback}
