# PROD profile configuration
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:postgresql://${CLOUD_HOST}:${CLOUD_PORT}/${CLOUD_DB_NAME}?sslmode=require
    username: ${CLOUD_USERNAME}
    password: ${CLOUD_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${CLOUD_CONNECTION_LIMIT:10}
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 20000
      pool-name: ProdHikariPool

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    root: WARN
    org.springframework: INFO
